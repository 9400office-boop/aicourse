<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>奇美 AI 智能選課</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: #fff8f1;
  color: #2c2418;
  line-height: 1.6;
}
.wrap { max-width: 820px; margin: 0 auto; padding: 24px 18px 60px; }
header.hero {
  background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
  color: #fff;
  padding: 28px 24px;
  border-radius: 16px;
  margin-bottom: 22px;
  box-shadow: 0 6px 22px rgba(234,88,12,.18);
}
header.hero h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: .5px; }
header.hero p { margin: 0; opacity: .95; font-size: 14px; }
.progress {
  height: 8px; background: #fde6cf; border-radius: 4px; overflow: hidden;
  margin-bottom: 22px;
}
.progress > div {
  height: 100%; background: linear-gradient(90deg, #fb923c, #ea580c);
  transition: width .4s ease;
}
.card {
  background: #fff;
  border: 1px solid #fde2c5;
  border-radius: 14px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(234,88,12,.05);
}
.q-num {
  display: inline-block; background: #fff1e0; color: #c2410c;
  font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
  margin-bottom: 10px; letter-spacing: .5px;
}
h2.q { margin: 0 0 18px; font-size: 19px; color: #1f1a12; }
.options { display: grid; gap: 10px; }
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border: 1.5px solid #f3d4b1;
  border-radius: 10px; cursor: pointer; background: #fffaf3;
  transition: all .15s;
}
.opt:hover { border-color: #fb923c; background: #fff3e3; }
.opt.selected {
  border-color: #ea580c; background: #fff1e0;
  box-shadow: 0 0 0 3px rgba(251,146,60,.18);
}
.opt input { accent-color: #ea580c; }
.opt .lbl { flex: 1; }
.opt .lbl strong { display: block; font-size: 15px; color: #1f1a12; font-weight: 600; }
.nav { display: flex; justify-content: space-between; margin-top: 22px; gap: 10px; }
button {
  font: inherit; padding: 11px 22px; border-radius: 9px; border: none;
  cursor: pointer; font-weight: 600; font-size: 14px;
  transition: all .15s;
}
button.primary { background: #ea580c; color: #fff; }
button.primary:hover:not(:disabled) { background: #c2410c; }
button.primary:disabled { background: #f3d4b1; cursor: not-allowed; }
button.ghost { background: #fff; color: #78635a; border: 1.5px solid #f3d4b1; }
button.ghost:hover { border-color: #fb923c; color: #c2410c; }

/* Text input fields */
.field { margin-bottom: 16px; }
.field label { display: block; margin-bottom: 6px; font-weight: 600; color: #1f1a12; font-size: 14px; }
.field input[type=text] {
  width: 100%; padding: 12px 14px; font-size: 15px;
  border: 1.5px solid #f3d4b1; border-radius: 10px; background: #fffaf3;
  font-family: inherit; transition: all .15s;
}
.field input[type=text]:focus {
  outline: none; border-color: #ea580c; background: #fff;
  box-shadow: 0 0 0 3px rgba(251,146,60,.18);
}
.field .hint { font-size: 12px; color: #a08773; margin-top: 4px; }

/* Result page */
.result-header { text-align: center; padding: 8px 0 20px; }
.result-header .badge {
  display: inline-block; background: #ea580c; color: #fff;
  padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;
  letter-spacing: 1px; margin-bottom: 10px;
}
.result-header h2 { margin: 0 0 4px; color: #1f1a12; font-size: 22px; }
.result-header p { margin: 0; color: #78635a; font-size: 14px; }

.summary {
  background: #fff7ec; border-left: 4px solid #ea580c;
  padding: 14px 16px; border-radius: 8px; margin-bottom: 18px;
  font-size: 14px;
}
.summary b { color: #c2410c; }

.track {
  margin-bottom: 14px; border: 1.5px solid #f3d4b1;
  border-radius: 12px; overflow: hidden; background: #fff;
  transition: all .15s;
}
.track.checked {
  border-color: #ea580c;
  box-shadow: 0 0 0 3px rgba(251,146,60,.18);
}
.track-head {
  padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #f7e0c1; cursor: pointer;
  background: #fffaf3;
}
.track-head:hover { background: #fff3e3; }
.track-head input[type=checkbox] {
  width: 20px; height: 20px; accent-color: #ea580c; cursor: pointer;
}
.track-tag {
  font-size: 12px; font-weight: 700; padding: 4px 10px;
  border-radius: 6px; letter-spacing: 1px;
}
.tag-must { background: #fee2e2; color: #b91c1c; }
.tag-rec  { background: #ffedd5; color: #c2410c; }
.tag-opt  { background: #e0e7ff; color: #4338ca; }
.track-title { flex: 1; font-weight: 700; font-size: 16px; color: #1f1a12; }
.track-why { color: #78635a; font-size: 13px; }
.track-body { padding: 6px 18px 14px; }
.session {
  display: flex; align-items: center; gap: 10px; padding: 9px 0;
  border-bottom: 1px dashed #f3d4b1; font-size: 14px;
}
.session:last-child { border-bottom: none; }
.session .date { font-weight: 600; color: #c2410c; min-width: 110px; }
.session .room { color: #78635a; font-size: 12px; }
.session .topic { flex: 1; }

.enroll-bar {
  position: sticky; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 2px solid #ea580c;
  padding: 14px 18px; margin: 18px -24px -24px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 -4px 12px rgba(234,88,12,.12);
}
.enroll-bar .count {
  flex: 1; font-size: 14px; color: #78635a;
}
.enroll-bar .count b { color: #c2410c; font-size: 16px; }

.actions { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; justify-content: center; }
.foot {
  margin-top: 24px; text-align: center; color: #a08773; font-size: 12px;
}
.foot strong { color: #c2410c; }

/* Success / error overlays */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #fff; border-radius: 10px; padding: 14px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  font-size: 14px; font-weight: 600;
  z-index: 1000; animation: slideDown .3s ease;
}
.toast.success { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
.toast.error   { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

.thanks {
  text-align: center; padding: 40px 20px 24px;
}
.thanks .check {
  width: 70px; height: 70px; margin: 0 auto 16px;
  border-radius: 50%; background: #dcfce7;
  display: flex; align-items: center; justify-content: center;
  color: #15803d; font-size: 36px;
}
.thanks h2 { color: #1f1a12; margin: 0 0 8px; }
.thanks p { color: #78635a; margin: 0 0 18px; }
.enroll-cta {
  margin: 18px auto 12px; padding: 22px 20px;
  background: linear-gradient(135deg, #fff1e0 0%, #ffe0c0 100%);
  border: 2px solid #ea580c; border-radius: 14px;
  max-width: 540px;
}
.enroll-cta h3 { margin: 0 0 8px; color: #c2410c; font-size: 17px; }
.enroll-cta p  { margin: 0 0 14px; color: #78635a; font-size: 14px; }
.enroll-list {
  background: #fff; border-radius: 8px; padding: 12px 14px; margin: 0 0 14px;
  text-align: left; font-size: 13px; color: #2c2418; max-height: 140px; overflow-y: auto;
}
.enroll-list .item { padding: 4px 0; border-bottom: 1px dashed #f3d4b1; }
.enroll-list .item:last-child { border-bottom: none; }
.enroll-link {
  display: inline-block; padding: 14px 28px; background: #ea580c; color: #fff;
  text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 16px;
  box-shadow: 0 4px 12px rgba(234,88,12,.3); transition: all .15s;
}
.enroll-link:hover { background: #c2410c; box-shadow: 0 6px 18px rgba(234,88,12,.4); transform: translateY(-1px); }
.enroll-skip {
  display: block; margin-top: 14px; color: #a08773;
  font-size: 13px; text-decoration: none;
}
.enroll-skip:hover { color: #c2410c; text-decoration: underline; }

@media (max-width: 520px) {
  header.hero h1 { font-size: 19px; }
  .card { padding: 18px; }
  h2.q { font-size: 17px; }
  .enroll-bar { margin: 18px -18px -18px; padding: 12px 14px; flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1>奇美醫院 AI 培訓 · 智能選課顧問</h1>
    <p>填寫資料、回答 6 個問題，獲得個人化推薦並送出報名意願</p>
  </header>

  <div class="progress"><div id="bar" style="width:0%"></div></div>
  <div id="app" class="card"></div>

  <div class="foot">
    主辦：深耕計畫辦公室、AI Everywhere 小組 <strong></strong>
  </div>
</div>

<script>
// ============================================================
//  ⚠️  必填：請把您部署 Apps Script Web App 後拿到的網址貼在這裡
//  範例：https://script.google.com/macros/s/AKfycbz.../exec
// ============================================================
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby2nBNVMsomgChTrin2ONlf7V5T3I-0--dNRRMpXat-WnIDAS_aV3kUnf2Bt4L1nU8/exec";

// 正式報名表單連結（同仁送出意願後會看到，點擊前往 Microsoft Forms 完成報名）
const REGISTRATION_URL = "https://forms.cloud.microsoft/r/Qtzps8P76R";

// ====== Course catalog (from poster) ======
const A_SESSIONS = [
  { code:"A1", date:"06/03 (三)", time:"13:00–17:00", room:"561會議室" },
  { code:"A2", date:"06/14 (日)", time:"08:00–12:00", room:"563會議室" },
  { code:"A3", date:"06/27 (六)", time:"08:00–12:00", room:"553會議室" },
  { code:"A4", date:"07/04 (六)", time:"13:00–17:00", room:"561會議室" }
];
const B_COHORTS = [
  { name:"B 第一梯 (須完整出席兩堂)", sessions:[
    { date:"07/12 (日)", time:"09:00–16:00", room:"552會議室", topic:"B1–B4 法律倫理 / RAG / 案例 / 知識庫向量" },
    { date:"07/26 (日)", time:"09:00–16:00", room:"552會議室", topic:"B5–B7 Agent設計 / 智慧助理 / 效能評估" }
  ]},
  { name:"B 第二梯 (須完整出席兩堂)", sessions:[
    { date:"08/23 (日)", time:"09:00–16:00", room:"552會議室", topic:"B1–B4 法律倫理 / RAG / 案例 / 知識庫向量" },
    { date:"09/05 (六)", time:"09:00–16:00", room:"563會議室", topic:"B5–B7 Agent設計 / 智慧助理 / 效能評估" }
  ]}
];
const S_SESSIONS = {
  S1: { code:"S1", date:"07/14 (二)", time:"14:00–17:00", room:"563會議室", topic:"AI 衛教短影音自動化生產線" },
  S2: { code:"S2", date:"07/10 (五)", time:"14:00–17:00", room:"552會議室", topic:"利用 RAG 加速醫學文獻檢索與綜述" },
  S3: { code:"S3", date:"07/24 (五)", time:"14:00–17:00", room:"563會議室", topic:"AI Agent 生成預診摘要與初版病歷" },
  S4: { code:"S4", date:"07/03 (五)", time:"14:00–17:00", room:"563會議室", topic:"報表自動化分析與會議自動生成" }
};

// ====== Questions ======
const Q = [
  { key:"role", title:"您的職級為何？", opts:[
      { v:"apex",  label:"一二級主管" },
      { v:"p3",    label:"三級主管"   },
      { v:"p4",    label:"四級主管"   },
      { v:"staff", label:"專業員工"   }
    ]},
  { key:"job", title:"您的職類為何？", opts:[
      { v:"nurse",  label:"護理"  },
      { v:"doctor", label:"醫師"  },
      { v:"allied", label:"醫事"  },
      { v:"admin",  label:"行政"  },
      { v:"it",     label:"資訊"  }
    ]},
  { key:"level", title:"您目前對 AI 工具（如 ChatGPT、Copilot）的熟悉度？", opts:[
      { v:"none",  label:"幾乎沒用過"   },
      { v:"some",  label:"偶爾使用"     },
      { v:"often", label:"熟練使用"     },
      { v:"power", label:"進階使用者"   }
    ]},
  { key:"goal", title:"接下來半年，您最想用 AI 解決什麼？", opts:[
      { v:"productivity", label:"提升個人工作效率" },
      { v:"clinical",     label:"臨床／衛教場景應用" },
      { v:"research",     label:"醫學研究與文獻整理" },
      { v:"automation",   label:"報表／公文／流程自動化" },
      { v:"build",        label:"想做出部門 AI 助理／系統整合" }
    ]},
  { key:"time", title:"半年內您可以投入的學習時間？", opts:[
      { v:"min",  label:"很有限（< 8 小時）"  },
      { v:"med",  label:"適中（8–20 小時）"   },
      { v:"high", label:"充裕（20–40 小時）"  },
      { v:"max",  label:"全力投入（> 40 小時）" }
    ]},
  { key:"task", title:"您是否有「特定專案」想先解決？", opts:[
      { v:"none",   label:"暫無特定專案"       },
      { v:"report", label:"報表自動化／會議紀錄" },
      { v:"edu",    label:"病人衛教短影音"       },
      { v:"lit",    label:"醫學文獻檢索／綜述"   },
      { v:"chart",  label:"預診摘要／病歷草擬"   },
      { v:"agent",  label:"部門知識助理／RAG 系統" }
    ]}
];

// ====== Label maps ======
const ROLE_LABEL = {apex:"一二級主管 (Apex)", p3:"三級主管 (Pillars)", p4:"四級主管 (Pillars)", staff:"專業員工 (Foundation)"};
const JOB_LABEL  = {nurse:"護理", doctor:"醫師", allied:"醫事", admin:"行政", it:"資訊"};
const LEVEL_LABEL= {none:"幾乎沒用過", some:"偶爾使用", often:"熟練", power:"進階使用者"};
const GOAL_LABEL = {productivity:"提升個人效率", clinical:"臨床/衛教場景", research:"醫學研究/文獻", automation:"報表/公文自動化", build:"部門 AI 助理/系統整合"};
const TIME_LABEL = {min:"<8 小時", med:"8–20 小時", high:"20–40 小時", max:">40 小時"};
const TASK_LABEL = {none:"暫無", report:"報表自動化", edu:"衛教影音", lit:"醫學文獻", chart:"預診摘要/病歷", agent:"部門知識助理/RAG"};
const TAG_LABEL  = {must:"強烈建議", rec:"建議", opt:"選修"};

// ====== State ======
const TOTAL_STEPS = Q.length + 1; // +1 for intro page
const state = { step: 0, ans: {}, info: { name:"", empId:"" }, enrollments: new Set(), submitted: false };
const app = document.getElementById("app");
const bar = document.getElementById("bar");

function setProgress() {
  const pct = state.submitted ? 100 : (state.step / TOTAL_STEPS) * 100;
  bar.style.width = pct + "%";
}

function render() {
  setProgress();
  if (state.submitted) return renderThanks();
  if (state.step === 0) return renderIntro();
  if (state.step <= Q.length) return renderQuestion(state.step - 1);
  return renderResult();
}

function renderIntro() {
  app.innerHTML = `
    <span class="q-num">第 1 步 / ${TOTAL_STEPS}</span>
    <h2 class="q">請先填寫您的基本資料</h2>
    <div class="field">
      <label for="name">姓名 <span style="color:#ef4444">*</span></label>
      <input type="text" id="name" value="${escapeAttr(state.info.name)}" placeholder="請輸入您的姓名">
    </div>
    <div class="field">
      <label for="empId">人事號 <span style="color:#ef4444">*</span></label>
      <input type="text" id="empId" value="${escapeAttr(state.info.empId)}" placeholder="請輸入您的人事號">
      <div class="hint">用於後續報名意願統計與通知</div>
    </div>
    <div class="nav">
      <span></span>
      <button class="primary" id="next" disabled>開始問卷 →</button>
    </div>
  `;
  const nameEl  = document.getElementById('name');
  const empEl   = document.getElementById('empId');
  const nextBtn = document.getElementById('next');
  function check() {
    state.info.name  = nameEl.value.trim();
    state.info.empId = empEl.value.trim();
    nextBtn.disabled = !(state.info.name && state.info.empId);
  }
  nameEl.addEventListener('input', check);
  empEl.addEventListener('input', check);
  check();
  nextBtn.addEventListener('click', () => { state.step++; render(); });
}

function renderQuestion(idx) {
  const q = Q[idx];
  const cur = state.ans[q.key];
  app.innerHTML = `
    <span class="q-num">第 ${idx + 2} 步 / ${TOTAL_STEPS}　·　問題 ${idx + 1} / ${Q.length}</span>
    <h2 class="q">${q.title}</h2>
    <div class="options">
      ${q.opts.map(o => `
        <label class="opt ${cur===o.v?'selected':''}">
          <input type="radio" name="${q.key}" value="${o.v}" ${cur===o.v?'checked':''}>
          <div class="lbl"><strong>${o.label}</strong></div>
        </label>
      `).join("")}
    </div>
    <div class="nav">
      <button class="ghost" id="back">← 上一步</button>
      <button class="primary" id="next" disabled>${idx === Q.length - 1 ? '看推薦結果 →' : '下一題 →'}</button>
    </div>
  `;
  app.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', e => {
      state.ans[q.key] = e.target.value;
      app.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      e.target.closest('.opt').classList.add('selected');
      document.getElementById('next').disabled = false;
    });
  });
  document.getElementById('next').disabled = !cur;
  document.getElementById('next').addEventListener('click', () => { state.step++; render(); });
  document.getElementById('back').addEventListener('click', () => { state.step--; render(); });
}

// ====== Recommendation engine ======
function recommend(a) {
  const recs = [];

  // -------- A 班 --------
  let aTag = "must", aWhy = "";
  if (a.level === "power" && a.time === "min") {
    aTag = "opt"; aWhy = "您已是進階使用者且時間有限，可僅挑一場補齊「醫療 GenAI 法律 / 倫理 / 資安紅線」內容。";
  } else if (a.level === "power") {
    aTag = "rec"; aWhy = "雖已熟練，建議仍挑一場 A 班完整聽法律倫理與奇美內部紅線。";
  } else {
    aWhy = "A 班是所有後續 B/S 班的入門基礎，涵蓋醫療 GenAI 法規倫理、工具實作與簡報自動化工作流。";
  }
  let aPick = A_SESSIONS;
  if (a.time === "min") aPick = [A_SESSIONS[0]];
  recs.push({ id:"A", tag:aTag, code:"A 班 · GenAI 基礎應用班", title:"任選一場（內容相同）", why:aWhy,
    sessions: aPick.map(s => ({ date:s.date, time:s.time, room:s.room, topic:`${s.code} GenAI 基礎應用班` }))
  });

  // -------- B 班 --------
  let bTag = null, bWhy = "";
  if (a.job === "it" || a.goal === "build" || a.task === "agent") {
    bTag = "must"; bWhy = "您的職類／目標是「系統整合 / 部門 AI 助理」，B 班是核心；須完整出席同一梯兩堂。";
  } else if (a.job === "doctor" && (a.goal === "research" || a.task === "lit")) {
    bTag = "must"; bWhy = "醫師＋研究 / 文獻場景，B 班的 RAG 與向量資料庫是必備。";
  } else if (a.role === "p3" || a.role === "p4" || a.role === "apex") {
    bTag = "rec"; bWhy = "主管角色建議認識 RAG / Agent，方便評估部門 AI 專案；可選任一梯。";
  } else if (a.time === "high" || a.time === "max") {
    bTag = "rec"; bWhy = "您時間充裕，建議加修 B 班加深對 RAG 與 Agent 的判斷力。";
  } else if (a.level === "power") {
    bTag = "opt"; bWhy = "已是進階使用者，可選修 B 班把工具串成工作流。";
  }
  if (bTag) {
    const bSessions = [];
    B_COHORTS.forEach(c => {
      bSessions.push({ date:`【${c.name}】`, time:"", room:"", topic:"" });
      c.sessions.forEach(s => bSessions.push(s));
    });
    recs.push({ id:"B", tag:bTag, code:"B 班 · AI Agent + RAG 進階應用班", title:"擇一梯次完整出席兩堂", why:bWhy, sessions:bSessions });
  }

  // -------- S 班特色課 --------
  const sScore = { S1:0, S2:0, S3:0, S4:0 };
  if (a.job === "nurse")  { sScore.S1+=3; sScore.S4+=1; }
  if (a.job === "doctor") { sScore.S2+=3; sScore.S3+=3; sScore.S1+=1; }
  if (a.job === "allied") { sScore.S2+=3; sScore.S3+=2; sScore.S4+=1; }
  if (a.job === "admin")  { sScore.S4+=3; }
  if (a.job === "it")     { sScore.S4+=1; sScore.S2+=1; sScore.S3+=1; }
  if (a.goal === "clinical")     { sScore.S1+=2; sScore.S3+=2; }
  if (a.goal === "research")     { sScore.S2+=3; }
  if (a.goal === "productivity") { sScore.S4+=2; }
  if (a.goal === "automation")   { sScore.S4+=3; }
  if (a.goal === "build")        { sScore.S3+=1; sScore.S4+=1; }
  if (a.task === "report") sScore.S4+=4;
  if (a.task === "edu")    sScore.S1+=4;
  if (a.task === "lit")    sScore.S2+=4;
  if (a.task === "chart")  sScore.S3+=4;

  const sList = Object.keys(sScore).sort((x,y) => sScore[y] - sScore[x]);
  const sTags = {};
  sList.forEach(k => {
    if (sScore[k] >= 4)      sTags[k] = "must";
    else if (sScore[k] >= 2) sTags[k] = "rec";
    else if (sScore[k] >= 1) sTags[k] = "opt";
  });
  if (a.time === "min") {
    let kept = false;
    sList.forEach(k => {
      if (sTags[k] === "must" && !kept) kept = true;
      else if (sTags[k]) delete sTags[k];
    });
  } else if (a.time === "med") {
    Object.keys(sTags).forEach(k => { if (sTags[k]==="opt") delete sTags[k]; });
  }
  const sLabel = {
    S1:"S1 · AI 衛教短影音自動化生產線",
    S2:"S2 · RAG 加速醫學文獻檢索與綜述",
    S3:"S3 · AI Agent 生成預診摘要與初版病歷",
    S4:"S4 · 報表自動化分析與會議自動生成"
  };
  const sWhy = {
    S1: a.task==="edu" ? "您指定衛教影音為核心任務 → 強烈建議。" : "您的職類 / 目標與衛教影音生產線高度相關。",
    S2: a.task==="lit" ? "您指定文獻檢索為核心任務 → 強烈建議。" : "您的研究與文獻情境會大幅受惠於 RAG 應用。",
    S3: a.task==="chart" ? "您指定預診摘要 / 病歷為核心任務 → 強烈建議。" : "臨床預診與病歷草擬是您場景的高 ROI 應用。",
    S4: a.task==="report" ? "您指定報表自動化為核心任務 → 強烈建議。" : "與您的工作效率 / 行政流程目標直接對應。"
  };
  ["S1","S2","S3","S4"].forEach(k => {
    if (!sTags[k]) return;
    const s = S_SESSIONS[k];
    recs.push({ id:k, tag:sTags[k], code:sLabel[k], title:"單堂半日課", why:sWhy[k],
      sessions:[{ date:s.date, time:s.time, room:s.room, topic:s.topic }]});
  });

  // -------- Power BI / Power Automate --------
  let pbiTag = null, pbiWhy = "";
  if (a.job === "nurse" || a.job === "allied" || a.job === "admin")
    { pbiTag = "rec"; pbiWhy = "您的職類強烈建議 Power BI 數據視覺化（交班、報表、品質指標看板）。"; }
  if (a.goal === "automation" || a.task === "report")
    { pbiTag = "must"; pbiWhy = "報表 / 自動化是您主要目標，Power BI 屬於必修。"; }
  if (a.job === "doctor" && pbiTag !== "must") { pbiTag = "opt"; pbiWhy = "醫師為選修建議，視研究數據視覺化需求加修。"; }
  if (pbiTag) recs.push({ id:"PBI", tag:pbiTag, code:"Power BI · 數據視覺化", title:"另案排課（依職類分梯）", why:pbiWhy,
    sessions:[{ date:"另行公告", time:"", room:"", topic:"院內 Power BI 軸線課程，依需求加開" }]});

  let paTag = null, paWhy = "";
  if (a.job === "admin" || a.job === "it")
    { paTag = "must"; paWhy = "公文 / 報表 / 系統整合 → Power Automate 為強烈建議（資訊建議考 PL-900）。"; }
  else if (a.goal === "automation" || a.task === "report")
    { paTag = "rec"; paWhy = "與報表 / 流程自動化目標一致。"; }
  else if (a.job === "nurse" || a.job === "allied")
    { paTag = "opt"; paWhy = "可選修，偏交班 / 報表簡單流程自動化。"; }
  if (paTag) recs.push({ id:"PA", tag:paTag, code:"Power Automate · 流程自動化", title:"另案排課", why:paWhy,
    sessions:[{ date:"另行公告", time:"", room:"", topic:"流程自動化軸線（行政 / 資訊建議考 PL-900）" }]});

  // sort by priority: must -> rec -> opt
  const order = { must:0, rec:1, opt:2 };
  recs.sort((x,y) => order[x.tag] - order[y.tag]);
  return recs;
}

// ====== Result rendering ======
function renderResult() {
  const a = state.ans;
  const recs = recommend(a);
  state._recs = recs; // cache for submit
  // 不預設勾選 — 由報名者自行決定
  const counts = { must:0, rec:0, opt:0 };
  recs.forEach(r => counts[r.tag]++);

  app.innerHTML = `
    <div class="result-header">
      <span class="badge">您的個人化推薦</span>
      <h2>共 ${recs.length} 門課程建議（強烈建議 ${counts.must} · 建議 ${counts.rec} · 選修 ${counts.opt}）</h2>
      <p>勾選您「想實際報名」的課程，下方按鈕送出</p>
    </div>

    <div class="summary">
      <b>${escapeHtml(state.info.name)}</b>（人事號 ${escapeHtml(state.info.empId)}）<br>
      ${ROLE_LABEL[a.role]}　·　${JOB_LABEL[a.job]}　·　AI 熟悉度：${LEVEL_LABEL[a.level]}<br>
      <b>學習目標：</b>${GOAL_LABEL[a.goal]}　|　<b>可投入時間：</b>${TIME_LABEL[a.time]}　|　<b>特定任務：</b>${TASK_LABEL[a.task]}
    </div>

    ${recs.map(r => {
      const checked = state.enrollments.has(r.id);
      return `
        <div class="track ${checked?'checked':''}" data-id="${r.id}">
          <label class="track-head">
            <input type="checkbox" data-id="${r.id}" ${checked?'checked':''}>
            <span class="track-tag tag-${r.tag}">${TAG_LABEL[r.tag]}</span>
            <div class="track-title">${r.code}</div>
          </label>
          <div class="track-body">
            <div class="track-why">${r.why}</div>
            ${r.sessions.map(s => s.date.startsWith("【") ? `
              <div class="session" style="border:none;padding:8px 0 2px;">
                <span style="font-weight:600;color:#78635a;font-size:13px;">${s.date}</span>
              </div>` : `
              <div class="session">
                <span class="date">${s.date}</span>
                <span class="topic">${s.topic||r.title}<br><span class="room">${s.time} ${s.room?'· '+s.room:''}</span></span>
              </div>`).join("")}
          </div>
        </div>
      `;
    }).join("")}

    <div class="enroll-bar">
      <div class="count">已勾選 <b id="cnt">${state.enrollments.size}</b> 門想報名的課程</div>
      <button class="ghost" id="back">← 修改</button>
      <button class="primary" id="submit">勾選後前往填寫報名表 →</button>
    </div>
  `;

  app.querySelectorAll('input[type=checkbox][data-id]').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.dataset.id;
      const track = e.target.closest('.track');
      if (e.target.checked) { state.enrollments.add(id); track.classList.add('checked'); }
      else { state.enrollments.delete(id); track.classList.remove('checked'); }
      document.getElementById('cnt').textContent = state.enrollments.size;
    });
  });
  document.getElementById('back').addEventListener('click', () => { state.step--; render(); });
  document.getElementById('submit').addEventListener('click', submitForm);
}

async function submitForm() {
  const btn = document.getElementById('submit');
  const a = state.ans;
  const recs = state._recs || [];
  const enrolled = recs.filter(r => state.enrollments.has(r.id));

  const payload = {
    name:      state.info.name,
    empId:     state.info.empId,
    role:      ROLE_LABEL[a.role],
    job:       JOB_LABEL[a.job],
    level:     LEVEL_LABEL[a.level],
    goal:      GOAL_LABEL[a.goal],
    time:      TIME_LABEL[a.time],
    task:      TASK_LABEL[a.task],
    recommendations: recs.map(r => `[${TAG_LABEL[r.tag]}] ${r.code}`),
    enrollments:     enrolled.map(r => r.code)
  };

  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
    showToast("尚未設定 Apps Script 網址。請依說明書部署後，把網址貼到 HTML 第 233 行的 SCRIPT_URL", "error");
    console.log("送出內容（測試用）:", payload);
    return;
  }

  btn.disabled = true; btn.textContent = "儲存中…";
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      // text/plain 避免 CORS preflight，由 Apps Script 端 JSON.parse
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === "ok") {
      // 自動開新分頁前往正式報名表單（如有勾選課程）
      if (enrolled.length > 0) {
        window.open(REGISTRATION_URL, "_blank", "noopener");
      }
      state.submitted = true;
      render();
    } else {
      throw new Error(data.error || "未知錯誤");
    }
  } catch (err) {
    console.error(err);
    showToast("儲存失敗：" + err.message, "error");
    btn.disabled = false; btn.textContent = "勾選後前往填寫報名表 →";
  }
}

function renderThanks() {
  const recs = state._recs || [];
  const enrolled = recs.filter(r => state.enrollments.has(r.id));
  const hasEnrollment = enrolled.length > 0;

  app.innerHTML = `
    <div class="thanks">
      <div class="check">✓</div>
      <h2>選課意願已成功送出！</h2>
      <p>感謝 <b>${escapeHtml(state.info.name)}</b> 的回覆，您的回答已記錄。</p>

      ${hasEnrollment ? `
        <div class="enroll-cta">
          <h3>正式報名表單已自動開啟</h3>
          <p>若沒有看到新分頁，請點擊下方按鈕。您勾選了 <b>${enrolled.length}</b> 門課程：</p>
          <div class="enroll-list">
            ${enrolled.map(r => `<div class="item">✓ ${r.code}</div>`).join("")}
          </div>
          <a class="enroll-link" href="${REGISTRATION_URL}" target="_blank" rel="noopener">
            開啟正式報名表單 →
          </a>
        </div>
      ` : `
        <div class="enroll-cta" style="background:#f5f5f5;border-color:#d4d4d4;">
          <h3 style="color:#525252;">您本次未勾選任何想報名的課程</h3>
          <p>若日後改變心意，可隨時點擊下方按鈕前往正式報名表單，或重新填寫一份問卷。</p>
          <a class="enroll-link" href="${REGISTRATION_URL}" target="_blank" rel="noopener" style="background:#525252;box-shadow:none;">
            前往報名表單
          </a>
        </div>
      `}

      <a href="javascript:void(0)" class="enroll-skip" id="restart">填寫新的一份問卷 →</a>
    </div>
  `;
  document.getElementById('restart').addEventListener('click', () => {
    state.step = 0; state.ans = {}; state.info = { name:"", empId:"" };
    state.enrollments = new Set(); state.submitted = false; state._recs = null;
    render();
  });
}

// ====== Helpers ======
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4500);
}

render();
</script>
</body>
</html>
