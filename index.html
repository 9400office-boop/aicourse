* { box-sizing: border-box; }
body {

}
.wrap { max-width: 820px; margin: 0 auto; padding: 24px 18px 60px; }
header.hero {

  color: #fff;

}
.progress > div {

}
.card {

}
h2.q { margin: 0 0 18px; font-size: 19px; color: #1f1a12; }
.options { display: grid; gap: 10px; }
.opt {

  padding: 14px 16px; border: 1.5px solid #f3d4b1;

}
.opt:hover { border-color: #fb923c; background: #fff3e3; }
.opt.selected {

  box-shadow: 0 0 0 3px rgba(251,146,60,.18);
}
.opt input { accent-color: #ea580c; }
.opt .lbl { flex: 1; }
.opt .lbl strong { display: block; font-size: 15px; color: #1f1a12; font-weight: 600; }
.nav { display: flex; justify-content: space-between; margin-top: 22px; gap: 10px; }
button {
  font: inherit; padding: 11px 22px; border-radius: 9px; border: none;
  cursor: pointer; font-weight: 600; font-size: 14px;
  transition: all .15s;
}
button.primary { background: #ea580c; color: #fff; }
button.primary:hover:not(:disabled) { background: #c2410c; }
button.primary:disabled { background: #f3d4b1; cursor: not-allowed; }
button.ghost { background: #fff; color: #78635a; border: 1.5px solid #f3d4b1; }
button.ghost:hover { border-color: #fb923c; color: #c2410c; }

.field { margin-bottom: 16px; }
.field label { display: block; margin-bottom: 6px; font-weight: 600; color: #1f1a12; font-size: 14px; }
.field input[type=text] {

  border: 1.5px solid #f3d4b1; border-radius: 10px; background: #fffaf3;

}

  box-shadow: 0 0 0 3px rgba(251,146,60,.18);
}
.field .hint { font-size: 12px; color: #a08773; margin-top: 4px; }

.result-header { text-align: center; padding: 8px 0 20px; }
.result-header .badge {
  display: inline-block; background: #ea580c; color: #fff;
  padding: 6px 14px; border-radius: 999px; font-size: 12px; font-weight: 600;

.result-header h2 { margin: 0 0 4px; color: #1f1a12; font-size: 22px; }
.result-header p { margin: 0; color: #78635a; font-size: 14px; }

.summary {

.track.checked {

}
.track-head {

.track-head:hover { background: #fff3e3; }
.track-head input[type=checkbox] {

.track-tag {

.tag-must { background: #fee2e2; color: #b91c1c; }
.tag-rec  { background: #ffedd5; color: #c2410c; }
.tag-opt  { background: #e0e7ff; color: #4338ca; }
.track-title { flex: 1; font-weight: 700; font-size: 16px; color: #1f1a12; }
.track-why { color: #78635a; font-size: 13px; }
.track-body { padding: 6px 18px 14px; }
.session {

  border-bottom: 1px dashed #f3d4b1; font-size: 14px;
}
.session:last-child { border-bottom: none; }
.session .date { font-weight: 600; color: #c2410c; min-width: 110px; }
.session .room { color: #78635a; font-size: 12px; }
.session .topic { flex: 1; }

.suggest-box {

}
.suggest-box.highlight {

.suggest-box label {

.suggest-box.highlight label { color: #c2410c; font-size: 15px; }

  background: #fff; font-family: inherit; resize: vertical; min-height: 70px;

.suggest-box textarea:focus {
  outline: none; border-color: #ea580c;

.online-item-title {

.online-arrow { color: #64748b; font-weight: 400; }
.online-item-desc {

  padding: 14px 18px; margin: 18px -24px -24px;

.foot {

.foot strong { color: #c2410c; }

/* Success / error overlays */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #fff; border-radius: 10px; padding: 14px 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
  font-size: 14px; font-weight: 600;
  z-index: 1000; animation: slideDown .3s ease;
}
.toast.success { background: #dcfce7; color: #15803d; border-left: 4px solid #22c55e; }
.toast.error   { background: #fee2e2; color: #b91c1c; border-left: 4px solid #ef4444; }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

.thanks {

.thanks h2 { color: #1f1a12; margin: 0 0 8px; }
.thanks p { color: #78635a; margin: 0 0 18px; }
.enroll-cta {

.enroll-skip {

@media (max-width: 520px) {
  header.hero h1 { font-size: 19px; }
  .card { padding: 18px; }
  h2.q { font-size: 17px; }
  .enroll-bar { margin: 18px -18px -18px; padding: 12px 14px; flex-wrap: wrap; }
}
</style>
</head>

};
const app = document.getElementById("app");
const bar = document.getElementById("bar");

function setProgress() {
  const pct = state.submitted ? 100 : (state.step / TOTAL_STEPS) * 100;
  bar.style.width = pct + "%";
}

function render() {
  setProgress();
  if (state.submitted) return renderThanks();
  if (state.step === 0) return renderIntro();
  if (state.step <= Q.length) return renderQuestion(state.step - 1);
  return renderResult();
}

function renderIntro() {
  app.innerHTML = `
    <span class="q-num">第 1 步 / ${TOTAL_STEPS}</span>
    <h2 class="q">請先填寫您的基本資料</h2>
    <div class="field">
      <label for="name">姓名 <span style="color:#ef4444">*</span></label>
      <input type="text" id="name" value="${escapeAttr(state.info.name)}" placeholder="請輸入您的姓名">
    </div>
    <div class="field">
      <label for="empId">人事號 <span style="color:#ef4444">*</span></label>
      <input type="text" id="empId" value="${escapeAttr(state.info.empId)}" placeholder="請輸入您的人事號">
      <div class="hint">用於後續報名意願統計使用</div>
    </div>
    <div class="nav">
      <span></span>
      <button class="primary" id="next" disabled>開始問卷 →</button>
    </div>
  `;
  const nameEl  = document.getElementById('name');
  const empEl   = document.getElementById('empId');
  const nextBtn = document.getElementById('next');
  function check() {
    state.info.name  = nameEl.value.trim();
    state.info.empId = empEl.value.trim();
    nextBtn.disabled = !(state.info.name && state.info.empId);
  }
  nameEl.addEventListener('input', check);
  empEl.addEventListener('input', check);
  check();
  nextBtn.addEventListener('click', () => { state.step++; render(); });
}

function renderQuestion(idx) {
  const q = Q[idx];
  const cur = state.ans[q.key];
  const hasOther = q.type === "with_other";
  app.innerHTML = `
    <span class="q-num">第 ${idx + 2} 步 / ${TOTAL_STEPS}　·　問題 ${idx + 1} / ${Q.length}</span>
    <h2 class="q">${q.title}</h2>
    <div class="options">
      ${q.opts.map(o => `
        <label class="opt ${cur===o.v?'selected':''}">
          <input type="radio" name="${q.key}" value="${o.v}" ${cur===o.v?'checked':''}>
          <div class="lbl"><strong>${o.label}</strong></div>
        </label>
      `).join("")}
    </div>
    ${hasOther ? `
      <div id="otherWrap" class="field" style="margin-top:14px;display:${cur==='other'?'block':'none'}">
        <label for="otherInput">請輸入您使用的工具名稱</label>
        <input type="text" id="otherInput" value="${escapeAttr(state.toolOther||'')}" placeholder="">
        <div class="hint"></div>
      </div>
    ` : ''}
    <div class="nav">
      <button class="ghost" id="back">← 上一步</button>
      <button class="primary" id="next" disabled>${idx === Q.length - 1 ? '看推薦結果 →' : '下一題 →'}</button>
    </div>
  `;

  function checkNext() {
    const nextBtn = document.getElementById('next');
    const v = state.ans[q.key];
    if (!v) { nextBtn.disabled = true; return; }
    if (hasOther && v === 'other') {
      nextBtn.disabled = !(state.toolOther && state.toolOther.trim());
    } else {
      nextBtn.disabled = false;
    }
  }

  app.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', e => {
      state.ans[q.key] = e.target.value;
      app.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      e.target.closest('.opt').classList.add('selected');
      if (hasOther) {
        const wrap = document.getElementById('otherWrap');
        wrap.style.display = e.target.value === 'other' ? 'block' : 'none';
      }
      checkNext();
    });
  });

  if (hasOther) {
    const inp = document.getElementById('otherInput');
    if (inp) inp.addEventListener('input', e => {
      state.toolOther = e.target.value;
      checkNext();
    });
  }

  checkNext();
  document.getElementById('next').addEventListener('click', () => { state.step++; render(); });
  document.getElementById('back').addEventListener('click', () => { state.step--; render(); });
}

// ====== Recommendation engine ======
function recommend(a) {
  // -------- 早退條件：以下情境不推薦任何院內課程，僅顯示免費線上資源 --------
  // 1. 每月可投入時間 < 4 小時
  if (a.time === "min") return [];
  // 2. 工具填「其他」且輸入內容非 GAI 工具
  if (a.tool === "other" && !isGAITool(state.toolOther)) return [];

  const recs = [];

  // -------- A 班 --------
  let aTag = "must", aWhy = "";
  if (a.level === "power" && a.time === "min") {
    aTag = "opt"; aWhy = "您已是進階使用者且時間有限，可僅挑一場補齊「醫療 GenAI 法律 / 倫理 / 資安紅線」內容。";
  } else if (a.level === "power") {
    aTag = "rec"; aWhy = "雖已熟練，建議仍挑一場 A 班完整聽法律倫理與奇美內部紅線。";
  } else {
    aWhy = "A 班是所有後續 B/S 班的入門基礎，涵蓋醫療 GenAI 法規倫理、工具實作與簡報自動化工作流。";
  }
  let aPick = A_SESSIONS;
  if (a.time === "min") aPick = [A_SESSIONS[0]];
  recs.push({ id:"A", tag:aTag, code:"A 班 · GenAI 基礎應用班", title:"任選一場（內容相同）", why:aWhy,
    sessions: aPick.map(s => ({ date:s.date, time:s.time, room:s.room, topic:`${s.code} GenAI 基礎應用班` }))
  });

  // -------- B 班 --------
  let bTag = null, bWhy = "";
  if (a.job === "it" || a.goal === "build" || a.task === "agent") {
    bTag = "must"; bWhy = "您的職類／目標是「系統整合 / 部門 AI 助理」，B 班是核心；須完整出席同一梯兩堂。";
  } else if (a.job === "doctor" && (a.goal === "research" || a.task === "lit")) {
    bTag = "must"; bWhy = "醫師＋研究 / 文獻場景，B 班的 RAG 與向量資料庫是必備。";
  } else if (a.role === "p3" || a.role === "p4" || a.role === "apex") {
    bTag = "rec"; bWhy = "主管角色建議認識 RAG / Agent，方便評估部門 AI 專案；可選任一梯。";
  } else if (a.time === "high" || a.time === "max") {
    bTag = "rec"; bWhy = "您時間充裕，建議加修 B 班加深對 RAG 與 Agent 的判斷力。";
  } else if (a.level === "power") {
    bTag = "opt"; bWhy = "已是進階使用者，可選修 B 班把工具串成工作流。";
  }
  if (bTag) {
    const bSessions = [];
    B_COHORTS.forEach(c => {
      bSessions.push({ date:`【${c.name}】`, time:"", room:"", topic:"" });
      c.sessions.forEach(s => bSessions.push(s));
    });
    recs.push({ id:"B", tag:bTag, code:"B 班 · AI Agent + RAG 進階應用班", title:"擇一梯次完整出席兩堂", why:bWhy, sessions:bSessions });
  }

  // -------- S 班特色課 --------
  const sScore = { S1:0, S2:0, S3:0, S4:0 };
  if (a.job === "nurse")  { sScore.S1+=3; sScore.S4+=1; }
  if (a.job === "doctor") { sScore.S2+=3; sScore.S3+=3; sScore.S1+=1; }
  if (a.job === "allied") { sScore.S2+=3; sScore.S3+=2; sScore.S4+=1; }
  if (a.job === "admin")  { sScore.S4+=3; }
  if (a.job === "it")     { sScore.S4+=1; sScore.S2+=1; sScore.S3+=1; }
  if (a.goal === "clinical")     { sScore.S1+=2; sScore.S3+=2; }
  if (a.goal === "research")     { sScore.S2+=3; }
  if (a.goal === "productivity") { sScore.S4+=2; }
  if (a.goal === "automation")   { sScore.S4+=3; }
  if (a.goal === "build")        { sScore.S3+=1; sScore.S4+=1; }
  if (a.task === "report") sScore.S4+=4;
  if (a.task === "edu")    sScore.S1+=4;
  if (a.task === "lit")    sScore.S2+=4;
  if (a.task === "chart")  sScore.S3+=4;

  const sList = Object.keys(sScore).sort((x,y) => sScore[y] - sScore[x]);
  const sTags = {};
  sList.forEach(k => {
    if (sScore[k] >= 4)      sTags[k] = "must";
    else if (sScore[k] >= 2) sTags[k] = "rec";
    else if (sScore[k] >= 1) sTags[k] = "opt";
  });
  if (a.time === "min") {
    let kept = false;
    sList.forEach(k => {
      if (sTags[k] === "must" && !kept) kept = true;
      else if (sTags[k]) delete sTags[k];
    });
  } else if (a.time === "med") {
    Object.keys(sTags).forEach(k => { if (sTags[k]==="opt") delete sTags[k]; });
  }
  const sLabel = {
    S1:"S1 · AI 衛教短影音自動化生產線",
    S2:"S2 · RAG 加速醫學文獻檢索與綜述",
    S3:"S3 · AI Agent 生成預診摘要與初版病歷",
    S4:"S4 · 報表自動化分析與會議自動生成"
  };
  const sWhy = {
    S1: a.task==="edu" ? "您指定衛教影音為核心任務 → 強烈建議。" : "您的職類 / 目標與衛教影音生產線高度相關。",
    S2: a.task==="lit" ? "您指定文獻檢索為核心任務 → 強烈建議。" : "您的研究與文獻情境會大幅受惠於 RAG 應用。",
    S3: a.task==="chart" ? "您指定預診摘要 / 病歷為核心任務 → 強烈建議。" : "臨床預診與病歷草擬是您場景的高 ROI 應用。",
    S4: a.task==="report" ? "您指定報表自動化為核心任務 → 強烈建議。" : "與您的工作效率 / 行政流程目標直接對應。"
  };
  ["S1","S2","S3","S4"].forEach(k => {
    if (!sTags[k]) return;
    const s = S_SESSIONS[k];
    recs.push({ id:k, tag:sTags[k], code:sLabel[k], title:"單堂半日課", why:sWhy[k],
      sessions:[{ date:s.date, time:s.time, room:s.room, topic:s.topic }]});
  });

  // sort by priority: must -> rec -> opt
  const order = { must:0, rec:1, opt:2 };
  recs.sort((x,y) => order[x.tag] - order[y.tag]);
  return recs;
}

// ====== Result rendering ======
function renderResult() {
  const a = state.ans;
  const recs = recommend(a);
  state._recs = recs; // cache for submit
  const counts = { must:0, rec:0, opt:0 };
  recs.forEach(r => counts[r.tag]++);

  // 早退原因（用於空推薦時的解釋文字）
  let emptyReason = "";
  if (recs.length === 0) {
    if (a.time === "min") {
      emptyReason = "您每月可投入學習時間較少（< 4 小時／月），目前院內課程最短也需 3–4 小時，故本次暫不推薦。建議可從下方「免費線上課程」學習，下一梯次有更多時間時歡迎參加。";
    } else if (a.tool === "other" && !isGAITool(state.toolOther)) {
      emptyReason = `您填寫的工具「${escapeHtml(state.toolOther)}」非屬本次課程項目，故本次暫不推薦。`;
    }
  }

  // 工具顯示文字（含其他輸入的內容）
  const toolDisplay = a.tool === "other"
    ? `其他：${escapeHtml(state.toolOther||"")}`
    : TOOL_LABEL[a.tool];

  app.innerHTML = `
    <div class="result-header">
      <span class="badge">您的個人化推薦</span>
      ${recs.length > 0
        ? `<h2>共 ${recs.length} 門課程建議（強烈建議 ${counts.must} · 建議 ${counts.rec} · 選修 ${counts.opt}）</h2>
           <p>勾選您「想實際報名」的課程，下方按鈕送出</p>`
        : `<h2>本次暫無院內課程推薦</h2>
           <p>但仍可參考下方「免費線上課程」開始學習</p>`}
    </div>

    <div class="summary">
      <b>${escapeHtml(state.info.name)}</b>（人事號 ${escapeHtml(state.info.empId)}）<br>
      ${ROLE_LABEL[a.role]}　·　${JOB_LABEL[a.job]}　·　AI 熟悉度：${LEVEL_LABEL[a.level]}　·　使用頻率：${FREQ_LABEL[a.freq]}<br>
      <b>常用工具：</b>${toolDisplay}　|　<b>目標：</b>${GOAL_LABEL[a.goal]}<br>
      <b>每月可投入：</b>${TIME_LABEL[a.time]}　|　<b>特定任務：</b>${TASK_LABEL[a.task]}
    </div>

    ${emptyReason ? `
      <div class="summary" style="background:#fef3c7;border-left-color:#d97706;">
        <b style="color:#92400e">說明：</b>${emptyReason}
      </div>
    ` : ""}

    ${recs.map(r => {
      const checked = state.enrollments.has(r.id);
      return `
        <div class="track ${checked?'checked':''}" data-id="${r.id}">
          <label class="track-head">
            <input type="checkbox" data-id="${r.id}" ${checked?'checked':''}>
            <span class="track-tag tag-${r.tag}">${TAG_LABEL[r.tag]}</span>
            <div class="track-title">${r.code}</div>
          </label>
          <div class="track-body">
            <div class="track-why">${r.why}</div>
            ${r.sessions.map(s => s.date.startsWith("【") ? `
              <div class="session" style="border:none;padding:8px 0 2px;">
                <span style="font-weight:600;color:#78635a;font-size:13px;">${s.date}</span>
              </div>` : `
              <div class="session">
                <span class="date">${s.date}</span>
                <span class="topic">${s.topic||r.title}<br><span class="room">${s.time} ${s.room?'· '+s.room:''}</span></span>
              </div>`).join("")}
          </div>
        </div>
      `;
    }).join("")}

    <!-- 課程主題建議 — 開放式回饋（特別重要：捕捉沒有被推薦的人的需求）-->
    <div class="suggest-box ${recs.length === 0 ? 'highlight' : ''}">
      <label for="suggestTopic">
        ${recs.length === 0
          ? '⚡ 您希望未來看到哪些 AI 課程主題？您的回饋將是未來課程規劃重要的參考'
          : '想建議辦公室新增的課程主題？（選填）'}
      </label>
      <textarea id="suggestTopic" rows="3" placeholder="例如：想學 NotebookLM 整理護理研究、想了解 Perplexity 做即時臨床查詢、希望加開 n8n 流程自動化..."></textarea>
    </div>

    <!-- 免費線上課程區塊 — 一律顯示 -->
    <div class="online-section">
      <div class="online-head">
        <span class="online-icon">🎓</span>
        <div>
          <div class="online-title">免費線上課程</div>
          <div class="online-sub">不限職類、不限時間，隨時可開始的自學資源</div>
        </div>
      </div>
      <div class="online-list">
        ${ONLINE_COURSES.map(c => `
          <a class="online-item" href="${c.url}" target="_blank" rel="noopener">
            <div class="online-item-title">${c.title} <span class="online-arrow">↗</span></div>
            <div class="online-item-desc">${c.desc}</div>
          </a>
        `).join("")}
      </div>
    </div>

    <div class="enroll-bar">
      <div class="count" id="cntText">${recs.length === 0 ? "（無院內課程可勾選）" : "尚未選擇課程"}</div>
      <button class="ghost" id="back">← 修改</button>
      <button class="primary" id="submit">${recs.length === 0 ? "送出回覆" : "勾選後前往填寫報名表 →"}</button>
    </div>
  `;

  // 單選模式：勾選一門時自動取消其他
  app.querySelectorAll('input[type=checkbox][data-id]').forEach(cb => {
    cb.addEventListener('change', e => {
      const id = e.target.dataset.id;
      if (e.target.checked) {
        state.enrollments.clear();
        state.enrollments.add(id);
        // 取消其他已勾選的課程
        app.querySelectorAll('input[type=checkbox][data-id]').forEach(other => {
          if (other.dataset.id !== id) {
            other.checked = false;
            other.closest('.track').classList.remove('checked');
          }
        });
        e.target.closest('.track').classList.add('checked');
      } else {
        state.enrollments.delete(id);
        e.target.closest('.track').classList.remove('checked');
      }
      const cnt = state.enrollments.size;
      const txt = document.getElementById('cntText');
      txt.innerHTML = cnt === 0
        ? '尚未選擇課程'
        : `已選擇：<b style="color:#c2410c">${[...state.enrollments].map(id => recs.find(r=>r.id===id).code).join('')}</b>`;
    });
  });
  document.getElementById('back').addEventListener('click', () => { state.step--; render(); });
  document.getElementById('submit').addEventListener('click', submitForm);

  // 「課程主題建議」textarea — 還原已輸入內容並綁定事件
  const ta = document.getElementById('suggestTopic');
  if (ta) {
    ta.value = state.suggestedTopic || "";
    ta.addEventListener('input', e => { state.suggestedTopic = e.target.value; });
  }

  // 自動儲存：結果頁一載入就靜默送出，避免使用者直接關閉視窗導致資料流失
  autoSubmit();
}

// 統一組裝 payload，stage 標記是「自動記錄」還是「手動送出」
function buildPayload(stage) {
  const a = state.ans;
  const recs = state._recs || [];
  const enrolled = recs.filter(r => state.enrollments.has(r.id));
  const toolText = a.tool === "other"
    ? `其他：${state.toolOther||""}`
    : TOOL_LABEL[a.tool];
  return {
    stage,
    name:      state.info.name,
    empId:     state.info.empId,
    role:      ROLE_LABEL[a.role],
    job:       JOB_LABEL[a.job],
    level:     LEVEL_LABEL[a.level],
    freq:      FREQ_LABEL[a.freq],
    tool:      toolText,
    goal:      GOAL_LABEL[a.goal],
    time:      TIME_LABEL[a.time],
    task:      TASK_LABEL[a.task],
    suggestedTopic: state.suggestedTopic || "",
    recommendations: recs.length > 0
      ? recs.map(r => `[${TAG_LABEL[r.tag]}] ${r.code}`)
      : ["（依條件無院內課程推薦，僅顯示免費線上資源）"],
    enrollments:     enrolled.map(r => r.code)
  };
}

// 自動靜默儲存 — 結果頁一載入就執行，避免使用者直接關閉視窗導致資料流失
async function autoSubmit() {
  if (state.autoSaved) return;
  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) return;
  state.autoSaved = true;
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(buildPayload("自動記錄"))
    });
    const data = await res.json();
    if (data.status !== "ok") {
      state.autoSaved = false; // 失敗時允許下次重試
    }
    // 自動儲存完全靜默 — 不顯示任何提示，避免使用者誤以為可以直接關閉視窗
  } catch (e) {
    console.warn("auto-save failed", e);
    state.autoSaved = false;
  }
}

async function submitForm() {
  const btn = document.getElementById('submit');
  const payload = buildPayload("手動送出");

  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
    showToast("尚未設定 Apps Script 網址。請依說明書部署後，把網址貼到 HTML 第 233 行的 SCRIPT_URL", "error");
    console.log("送出內容（測試用）:", payload);
    return;
  }

  btn.disabled = true; btn.textContent = "儲存中…";
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === "ok") {
      state.submitted = true;
      render();
    } else {
      throw new Error(data.error || "未知錯誤");
    }
  } catch (err) {
    console.error(err);
    showToast("儲存失敗：" + err.message, "error");
    btn.disabled = false;
    const recs = state._recs || [];
    btn.textContent = recs.length === 0 ? "送出回覆" : "勾選後前往填寫報名表 →";
  }
}

function renderThanks() {
  const recs = state._recs || [];
  const enrolled = recs.filter(r => state.enrollments.has(r.id));
  const hasEnrollment = enrolled.length > 0;

  app.innerHTML = `
    <div class="thanks">
      <div class="check">✓</div>
      <h2>選課意願已成功送出！</h2>
      <p>感謝 <b>${escapeHtml(state.info.name)}</b> 的回覆，您的回答已記錄。</p>

      ${hasEnrollment ? `
        <div class="enroll-cta">
          <h3>下一步：完成正式報名</h3>
          <p>請點擊下方按鈕前往正式報名表單，完成最後手續。您勾選了推薦的 <b>${enrolled.length}</b> 門課程：</p>
          <div class="enroll-list">
            ${enrolled.map(r => `<div class="item">✓ ${r.code}</div>`).join("")}
          </div>
          <a class="enroll-link" href="${REGISTRATION_URL}" target="_blank" rel="noopener">
            前往正式報名表單 →
          </a>
        </div>
      ` : `
        <div class="enroll-cta">
          <h3>感謝您的回饋！</h3>
          <p>這對我們規劃下次課程非常重要，尤其是您填寫的「希望課程主題」，將是未來規劃新班需求的關鍵依據。</p>
          <p style="margin-top:10px;font-size:13px;color:#a08773">若想報名現有課程，仍可點擊下方按鈕前往報名表。</p>
          <a class="enroll-link" href="${REGISTRATION_URL}" target="_blank" rel="noopener">
            前往報名表單
          </a>
        </div>
      `}

      <a href="javascript:void(0)" class="enroll-skip" id="restart">填寫新的一份問卷 →</a>
    </div>
  `;
  document.getElementById('restart').addEventListener('click', () => {
    state.step = 0; state.ans = {}; state.info = { name:"", empId:"" };
    state.toolOther = ""; state.enrollments = new Set();
    state.suggestedTopic = ""; state.autoSaved = false;
    state.submitted = false; state._recs = null;
    render();
  });
}

// ====== Helpers ======
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4500);
}

render();
</script>
</body>
</html>
