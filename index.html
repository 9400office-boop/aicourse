<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>奇美 AI 培訓 · 智能選課</title>
<style>
:root {
  color-scheme: light;
  /* 系統色 — 灰階主軸 */
  --ink-1: #0a0e14;
  --ink-2: #1f2937;
  --ink-3: #334155;
  --ink-4: #475569;
  --ink-5: #64748b;
  --ink-6: #94a3b8;
  --line:   #cbd5e1;
  --line-2: #94a3b8;
  --line-3: #64748b;
  --bg-1:   #f8fafc;
  --bg-2:   #f1f5f9;
  --card:   #ffffff;
  /* 橘色 accent — 收斂使用 */
  --accent:      #ea580c;
  --accent-soft: #fb923c;
  --accent-deep: #c2410c;
  --accent-pale: #fff7ed;
  --accent-50:   #fff7ed;
  --accent-100:  #ffedd5;
  --accent-200:  #fed7aa;
  /* 強調色 */
  --green: #059669;
  --red:   #dc2626;
  --blue:  #2563eb;
  /* 系統陰影 */
  --shadow-xs: 0 1px 2px rgba(15, 23, 42, .04);
  --shadow-sm: 0 1px 2px rgba(15, 23, 42, .05), 0 1px 3px rgba(15, 23, 42, .06);
  --shadow-md: 0 4px 6px -1px rgba(15, 23, 42, .04), 0 2px 4px -2px rgba(15, 23, 42, .04);
  --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, .06), 0 4px 6px -4px rgba(15, 23, 42, .04);
  --radius-sm: 8px;
  --radius:    10px;
  --radius-md: 12px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
  color: var(--ink-1);
  line-height: 1.6;
  font-size: 15px;
  background:
    radial-gradient(at 12% 8%,  #fff3e6 0%, transparent 35%),
    radial-gradient(at 88% 12%, #ffe4d4 0%, transparent 32%),
    radial-gradient(at 78% 92%, #e0f2fe 0%, transparent 35%),
    radial-gradient(at 18% 88%, #fae8ff 0%, transparent 30%),
    var(--bg-1);
  background-attachment: fixed;
  position: relative;
  overflow-x: hidden;
}

/* === 自訂捲軸 === */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--line-2);
  border-radius: 99px;
  border: 2px solid var(--bg-1);
}
::-webkit-scrollbar-thumb:hover { background: var(--ink-5); }

/* === 液態流動玻璃背景 — 多顆 blob 不同節奏 === */
.liquid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.liquid-bg::before,
.liquid-bg::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  will-change: transform;
}
.liquid-bg::before {
  width: 55vmax; height: 55vmax;
  top: -20vmax; right: -15vmax;
  background: radial-gradient(circle, rgba(251,146,60,.55) 0%, rgba(251,146,60,0) 65%);
  animation: floatA 24s ease-in-out infinite;
  opacity: .85;
}
.liquid-bg::after {
  width: 60vmax; height: 60vmax;
  bottom: -25vmax; left: -18vmax;
  background: radial-gradient(circle, rgba(147,197,253,.55) 0%, rgba(147,197,253,0) 65%);
  animation: floatB 28s ease-in-out infinite;
  opacity: .8;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  will-change: transform;
}
.blob-1 {
  width: 38vmax; height: 38vmax;
  top: 30%; left: 38%;
  background: radial-gradient(circle, rgba(254,200,150,.5) 0%, rgba(254,200,150,0) 60%);
  animation: floatC 32s ease-in-out infinite;
  opacity: .9;
}
.blob-2 {
  width: 30vmax; height: 30vmax;
  top: 8%; left: 12%;
  background: radial-gradient(circle, rgba(217,178,255,.4) 0%, rgba(217,178,255,0) 60%);
  animation: floatD 26s ease-in-out infinite;
  opacity: .7;
}
.blob-3 {
  width: 32vmax; height: 32vmax;
  bottom: 12%; right: 18%;
  background: radial-gradient(circle, rgba(255,200,200,.42) 0%, rgba(255,200,200,0) 60%);
  animation: floatE 30s ease-in-out infinite;
  opacity: .75;
}
.blob-4 {
  width: 26vmax; height: 26vmax;
  top: 55%; left: 5%;
  background: radial-gradient(circle, rgba(180,230,255,.45) 0%, rgba(180,230,255,0) 60%);
  animation: floatF 34s ease-in-out infinite;
  opacity: .8;
}

@keyframes floatA {
  0%   { transform: translate(0, 0)        rotate(0deg)   scale(1); }
  33%  { transform: translate(-7vw, 4vh)   rotate(120deg) scale(1.12); }
  66%  { transform: translate(4vw, -6vh)   rotate(240deg) scale(.95); }
  100% { transform: translate(0, 0)        rotate(360deg) scale(1); }
}
@keyframes floatB {
  0%   { transform: translate(0, 0)        rotate(0deg)    scale(1); }
  40%  { transform: translate(8vw, -5vh)   rotate(-140deg) scale(1.1); }
  75%  { transform: translate(-3vw, 4vh)   rotate(-260deg) scale(.92); }
  100% { transform: translate(0, 0)        rotate(-360deg) scale(1); }
}
@keyframes floatC {
  0%, 100% { transform: translate(0, 0)              scale(1); }
  50%      { transform: translate(6vw, -7vh)         scale(1.15); }
}
@keyframes floatD {
  0%, 100% { transform: translate(0, 0)              scale(1); }
  50%      { transform: translate(-5vw, 8vh)         scale(.9); }
}
@keyframes floatE {
  0%, 100% { transform: translate(0, 0)              scale(1); }
  50%      { transform: translate(7vw, 6vh)          scale(1.08); }
}
@keyframes floatF {
  0%, 100% { transform: translate(0, 0)              scale(1); }
  50%      { transform: translate(4vw, -9vh)         scale(.95); }
}

/* === 玻璃噪點疊層 === */
.liquid-bg::before, .liquid-bg::after, .blob { mix-blend-mode: normal; }
.glass-veil {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(180deg, rgba(255,255,255,.15) 0%, transparent 30%, transparent 70%, rgba(255,255,255,.1) 100%);
  backdrop-filter: blur(.5px);
  -webkit-backdrop-filter: blur(.5px);
}

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 28px 20px 60px;
  position: relative;
  z-index: 2;
}

/* === Hero — SaaS 系統風格 header === */
header.hero {
  position: relative;
  background: rgba(255,255,255,.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,.6);
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeUp .5s cubic-bezier(.4,0,.2,1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-logo {
  width: 40px; height: 40px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 800; font-size: 17px;
  box-shadow:
    0 2px 8px rgba(234, 88, 12, .35),
    inset 0 1px 0 rgba(255,255,255,.35),
    inset 0 -1px 0 rgba(0,0,0,.08);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.hero-logo::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.25) 0%, transparent 100%);
  pointer-events: none;
}
.hero-title { flex: 1; min-width: 0; }
.hero-title h1 {
  margin: 0;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hero-title .ver {
  display: inline-block;
  font-size: 11px;
  color: var(--ink-5);
  font-weight: 500;
  margin-left: 6px;
  vertical-align: middle;
}
.hero-title p {
  margin: 2px 0 0;
  font-size: 12px;
  color: var(--ink-5);
}
.hero-chips { display: flex; gap: 6px; flex-shrink: 0; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: rgba(241,245,249,.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: var(--ink-3);
  border: 1.5px solid var(--line);
  white-space: nowrap;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.6);
}
.chip:hover { transform: translateY(-1px); box-shadow: 0 2px 6px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.6); }
.chip::before {
  content: "";
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--ink-6);
}
.chip.green { background: #ecfdf5; color: #047857; border-color: #a7f3d0; }
.chip.green::before { background: var(--green); }
.chip.orange { background: var(--accent-50); color: var(--accent-deep); border-color: var(--accent-200); }
.chip.orange::before { background: var(--accent); }
.chip.purple { background: #faf5ff; color: #6b21a8; border-color: #e9d5ff; }
.chip.purple::before { background: #9333ea; }

/* === Tab/Progress bar — 深色 dock 風格 === */
.tab-dock {
  background: linear-gradient(180deg, #1a2332 0%, #0a0e14 100%);
  border-radius: var(--radius-md);
  padding: 6px;
  margin-bottom: 16px;
  display: flex;
  gap: 4px;
  box-shadow:
    var(--shadow-md),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(0,0,0,.2);
  position: relative;
  overflow: hidden;
  animation: fadeUp .5s cubic-bezier(.4,0,.2,1) both;
  animation-delay: .05s;
}
.tab-dock::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at top, rgba(255,255,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(251,146,60,.08) 0%, transparent 60%);
  pointer-events: none;
}
.tab-item {
  flex: 1;
  text-align: center;
  padding: 10px 8px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,.55);
  border-radius: 8px;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  position: relative;
  z-index: 1;
  cursor: default;
}
.tab-item.active {
  background: rgba(255,255,255,.1);
  color: #fff;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,.12),
    0 2px 8px rgba(0,0,0,.2);
  text-shadow: 0 1px 2px rgba(0,0,0,.2);
}
.tab-item.done {
  color: rgba(251,146,60,.95);
}
.tab-item.done::after {
  content: "✓";
  margin-left: 4px;
  font-size: 11px;
  display: inline-block;
  animation: pop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes pop {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

/* === Progress bar 細版 === */
.progress {
  height: 4px;
  border-radius: 99px;
  margin-bottom: 16px;
  background: rgba(203,213,225,.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  overflow: hidden;
  position: relative;
  box-shadow: inset 0 1px 2px rgba(15,23,42,.06);
}
.progress > div {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent-soft) 0%, var(--accent) 50%, var(--accent-soft) 100%);
  background-size: 200% 100%;
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 12px rgba(234, 88, 12, .45), inset 0 1px 0 rgba(255,255,255,.4);
  animation: progressFlow 2.5s linear infinite;
}
@keyframes progressFlow {
  from { background-position: 0% 0; }
  to   { background-position: 200% 0; }
}

/* === 主卡片 — 微玻璃 === */
.card {
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-md);
  padding: 28px;
  box-shadow:
    var(--shadow-sm),
    inset 0 1px 0 rgba(255,255,255,.7);
  position: relative;
  animation: fadeUp .5s cubic-bezier(.4,0,.2,1) both;
  animation-delay: .1s;
}
.card::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.85), transparent);
  border-radius: var(--radius-md) var(--radius-md) 0 0;
  pointer-events: none;
}

.q-num {
  display: inline-block;
  background: var(--bg-2);
  color: var(--ink-4);
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  margin-bottom: 14px;
  letter-spacing: 0;
  border: 1.5px solid var(--line);
  font-feature-settings: "tnum";
}
h2.q {
  margin: 0 0 22px;
  font-size: 20px;
  font-weight: 700;
  color: var(--ink-1);
  letter-spacing: -0.01em;
}

/* === Options - 系統列表風 === */
.options { display: grid; gap: 8px; }
.opt {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  cursor: pointer;
  background: rgba(255,255,255,.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: all .2s cubic-bezier(.4,0,.2,1);
  position: relative;
  overflow: hidden;
}
.opt::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,.3) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform .6s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
.opt:hover {
  border-color: var(--line-2);
  background: rgba(248,250,252,.85);
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(15,23,42,.06);
}
.opt:hover::after { transform: translateX(100%); }
.opt:active { transform: translateY(0); }
.opt.selected {
  border-color: var(--accent);
  background: rgba(255,247,237,.85);
  box-shadow:
    0 0 0 3px rgba(234, 88, 12, .14),
    0 2px 8px rgba(234, 88, 12, .08);
  transform: translateY(-1px);
}
.opt input { accent-color: var(--accent); }
.opt .lbl { flex: 1; }
.opt .lbl strong {
  display: block;
  font-size: 14.5px;
  color: var(--ink-1);
  font-weight: 500;
}

.nav { display: flex; justify-content: space-between; margin-top: 24px; gap: 10px; }

/* === Buttons === */
button {
  font: inherit;
  padding: 9px 18px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all .15s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
button.primary {
  background: linear-gradient(135deg, var(--accent-soft) 0%, var(--accent) 100%);
  color: #fff;
  box-shadow:
    0 1px 2px rgba(234, 88, 12, .25),
    0 4px 12px rgba(234, 88, 12, .18),
    inset 0 1px 0 rgba(255,255,255,.25);
  position: relative;
  overflow: hidden;
}
button.primary::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.18) 0%, transparent 100%);
  pointer-events: none;
}
button.primary:hover:not(:disabled) {
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
  box-shadow:
    0 2px 4px rgba(234, 88, 12, .3),
    0 8px 20px rgba(234, 88, 12, .28),
    inset 0 1px 0 rgba(255,255,255,.25);
  transform: translateY(-1px);
}
button.primary:active:not(:disabled) {
  transform: translateY(0);
  box-shadow: 0 1px 2px rgba(234, 88, 12, .25), inset 0 1px 2px rgba(0,0,0,.1);
}
button.primary:disabled {
  background: var(--line-2);
  color: var(--ink-6);
  cursor: not-allowed;
  box-shadow: none;
}
button.ghost {
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: var(--ink-3);
  border: 1.5px solid var(--line);
}
button.ghost:hover {
  border-color: var(--line-2);
  color: var(--ink-1);
  background: rgba(248,250,252,.85);
  transform: translateY(-1px);
}
button.ghost:active { transform: translateY(0); }

/* === 表單欄位 === */
.field { margin-bottom: 18px; }
.field label {
  display: block;
  margin-bottom: 6px;
  font-weight: 500;
  color: var(--ink-2);
  font-size: 13px;
}
.field input[type=text] {
  width: 100%;
  padding: 11px 14px;
  font-size: 14px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  font-family: inherit;
  transition: all .2s cubic-bezier(.4,0,.2,1);
  color: var(--ink-1);
  box-shadow: inset 0 1px 2px rgba(15,23,42,.04);
}
.field input[type=text]:hover {
  border-color: var(--line-2);
  background: rgba(255,255,255,.85);
}
.field input[type=text]:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(234, 88, 12, .14), inset 0 1px 2px rgba(15,23,42,.04);
}
.field .hint { font-size: 12px; color: var(--ink-5); margin-top: 4px; }

/* === 結果頁 === */
.result-header { padding: 4px 0 18px; }
.result-header .badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .5px;
  margin-bottom: 10px;
}
.result-header h2 {
  margin: 0 0 4px;
  color: var(--ink-1);
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.01em;
}
.result-header p { margin: 0; color: var(--ink-5); font-size: 13.5px; }

.summary {
  background: var(--bg-1);
  border: 1.5px solid var(--line);
  border-left: 4px solid var(--accent);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  margin-bottom: 18px;
  font-size: 13.5px;
  color: var(--ink-3);
  line-height: 1.7;
}
.summary b { color: var(--ink-1); font-weight: 600; }

.track {
  margin-bottom: 12px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  overflow: hidden;
  background: rgba(255,255,255,.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all .25s cubic-bezier(.4,0,.2,1);
}
.track:hover {
  border-color: var(--line-2);
  transform: translateY(-1px);
  box-shadow: 0 4px 14px rgba(15,23,42,.06);
}
.track.checked {
  border-color: var(--accent);
  box-shadow:
    0 0 0 3px rgba(234, 88, 12, .14),
    0 4px 14px rgba(234, 88, 12, .1);
  transform: translateY(-1px);
}
.track-head {
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 1.5px solid var(--line);
  cursor: pointer;
  background: var(--card);
  transition: background .15s;
}
.track-head:hover { background: var(--bg-1); }
.track.checked .track-head { background: var(--accent-50); }
.track-head input[type=checkbox] {
  width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
}
.track-tag {
  font-size: 11px; font-weight: 700;
  padding: 3px 8px;
  border-radius: 5px;
  letter-spacing: .5px;
  border: 1.5px solid;
}
.tag-must { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
.tag-rec  { background: var(--accent-50); color: var(--accent-deep); border-color: var(--accent-200); }
.tag-opt  { background: #eef2ff; color: #4338ca; border-color: #c7d2fe; }
.track-title { flex: 1; font-weight: 600; font-size: 15px; color: var(--ink-1); }
.track-why { color: var(--ink-4); font-size: 13px; line-height: 1.6; }
.track-body { padding: 12px 16px 14px; }

.session {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--line);
  font-size: 13.5px;
}
.session:last-child { border-bottom: none; }

function renderQuestion(idx) {

    </div>
  `;
  function checkNext() {
    const nextBtn = document.getElementById('next');
    const v = state.ans[q.key];
    if (!v) { nextBtn.disabled = true; return; }
    if (hasOther && v === 'other') {
      nextBtn.disabled = !(state.toolOther && state.toolOther.trim());
    } else {
      nextBtn.disabled = false;
    }
  }
  app.querySelectorAll('input[type=radio]').forEach(r => {
    r.addEventListener('change', e => {
      state.ans[q.key] = e.target.value;
      app.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      e.target.closest('.opt').classList.add('selected');
      if (hasOther) {
        const wrap = document.getElementById('otherWrap');
        wrap.style.display = e.target.value === 'other' ? 'block' : 'none';
      }
      updateChips();
      checkNext();

  if (hasOther) {
    const inp = document.getElementById('otherInput');
    if (inp) inp.addEventListener('input', e => {
      state.toolOther = e.target.value;
      checkNext();
    });
  }
  checkNext();
  document.getElementById('next').addEventListener('click', () => { state.step++; render(); });
  document.getElementById('back').addEventListener('click', () => { state.step--; render(); });

// ====== Recommendation engine ======
function recommend(a) {
  // -------- 早退條件:以下情境不推薦任何院內課程,僅顯示免費線上資源 --------
  // 1. 每月可投入時間 < 4 小時
  if (a.time === "min") return [];
  // 2. 工具填「其他」且輸入內容非 GAI 工具
  if (a.tool === "other" && !isGAITool(state.toolOther)) return [];
  const recs = [];
  // -------- A 班 --------
  let aTag = "must", aWhy = "";
  if (a.level === "power" && a.time === "min") {
    aTag = "opt"; aWhy = "您已是進階使用者且時間有限,可僅挑一場補齊「醫療 GenAI 法律 / 倫理 / 資安紅線」內容。";
  } else if (a.level === "power") {
    aTag = "rec"; aWhy = "雖已熟練,建議仍挑一場 A 班完整聽法律倫理與奇美內部紅線。";
  } else {
    aWhy = "A 班是所有後續 B/S 班的入門基礎,涵蓋醫療 GenAI 法規倫理、工具實作與簡報自動化工作流。";
  }
  let aPick = A_SESSIONS;
  if (a.time === "min") aPick = [A_SESSIONS[0]];
  recs.push({ id:"A", tag:aTag, code:"A 班 · GenAI 基礎應用班", title:"任選一場(內容相同)", why:aWhy,
    sessions: aPick.map(s => ({ date:s.date, time:s.time, room:s.room, topic:`${s.code} GenAI 基礎應用班` }))
  });
  // -------- B 班 --------
  let bTag = null, bWhy = "";
  if (a.job === "it" || a.goal === "build" || a.task === "agent") {
    bTag = "must"; bWhy = "您的職類/目標是「系統整合 / 部門 AI 助理」,B 班是核心;須完整出席同一梯兩堂。";
  } else if (a.job === "doctor" && (a.goal === "research" || a.task === "lit")) {
    bTag = "must"; bWhy = "醫師＋研究 / 文獻場景,B 班的 RAG 與向量資料庫是必備。";
  } else if (a.role === "p3" || a.role === "p4" || a.role === "apex") {
    bTag = "rec"; bWhy = "主管角色建議認識 RAG / Agent,方便評估部門 AI 專案;可選任一梯。";
  } else if (a.time === "high" || a.time === "max") {
    bTag = "rec"; bWhy = "您時間充裕,建議加修 B 班加深對 RAG 與 Agent 的判斷力。";
  } else if (a.level === "power") {
    bTag = "opt"; bWhy = "已是進階使用者,可選修 B 班把工具串成工作流。";
  }
  if (bTag) {
    const bSessions = [];
    B_COHORTS.forEach(c => {
      bSessions.push({ date:`【${c.name}】`, time:"", room:"", topic:"" });
      c.sessions.forEach(s => bSessions.push(s));
    });
    recs.push({ id:"B", tag:bTag, code:"B 班 · AI Agent + RAG 進階應用班", title:"擇一梯次完整出席兩堂", why:bWhy, sessions:bSessions });
  }
  // -------- S 班特色課 --------
  const sScore = { S1:0, S2:0, S3:0, S4:0 };
  if (a.job === "nurse")  { sScore.S1+=3; sScore.S4+=1; }
  if (a.job === "doctor") { sScore.S2+=3; sScore.S3+=3; sScore.S1+=1; }
  if (a.job === "allied") { sScore.S2+=3; sScore.S3+=2; sScore.S4+=1; }
  if (a.job === "admin")  { sScore.S4+=3; }
  if (a.job === "it")     { sScore.S4+=1; sScore.S2+=1; sScore.S3+=1; }
  if (a.goal === "clinical")     { sScore.S1+=2; sScore.S3+=2; }
  if (a.goal === "research")     { sScore.S2+=3; }
  if (a.goal === "productivity") { sScore.S4+=2; }
  if (a.goal === "automation")   { sScore.S4+=3; }
  if (a.goal === "build")        { sScore.S3+=1; sScore.S4+=1; }
  if (a.task === "report") sScore.S4+=4;
  if (a.task === "edu")    sScore.S1+=4;
  if (a.task === "lit")    sScore.S2+=4;
  if (a.task === "chart")  sScore.S3+=4;
  const sList = Object.keys(sScore).sort((x,y) => sScore[y] - sScore[x]);
  const sTags = {};
  sList.forEach(k => {
    if (sScore[k] >= 4)      sTags[k] = "must";
    else if (sScore[k] >= 2) sTags[k] = "rec";
    else if (sScore[k] >= 1) sTags[k] = "opt";
  });
  if (a.time === "min") {
    let kept = false;
    sList.forEach(k => {
      if (sTags[k] === "must" && !kept) kept = true;
      else if (sTags[k]) delete sTags[k];
    });
  } else if (a.time === "med") {
    Object.keys(sTags).forEach(k => { if (sTags[k]==="opt") delete sTags[k]; });
  }
  const sLabel = {
    S1:"S1 · AI 衛教短影音自動化生產線",
    S2:"S2 · RAG 加速醫學文獻檢索與綜述",
    S3:"S3 · AI Agent 生成預診摘要與初版病歷",
    S4:"S4 · 報表自動化分析與會議自動生成"
  };
  const sWhy = {
    S1: a.task==="edu" ? "您指定衛教影音為核心任務 → 強烈建議。" : "您的職類 / 目標與衛教影音生產線高度相關。",
    S2: a.task==="lit" ? "您指定文獻檢索為核心任務 → 強烈建議。" : "您的研究與文獻情境會大幅受惠於 RAG 應用。",
    S3: a.task==="chart" ? "您指定預診摘要 / 病歷為核心任務 → 強烈建議。" : "臨床預診與病歷草擬是您場景的高 ROI 應用。",
    S4: a.task==="report" ? "您指定報表自動化為核心任務 → 強烈建議。" : "與您的工作效率 / 行政流程目標直接對應。"
  };
  ["S1","S2","S3","S4"].forEach(k => {
    if (!sTags[k]) return;
    const s = S_SESSIONS[k];
    recs.push({ id:k, tag:sTags[k], code:sLabel[k], title:"單堂半日課", why:sWhy[k],
      sessions:[{ date:s.date, time:s.time, room:s.room, topic:s.topic }]});
  });
  // sort by priority: must -> rec -> opt
  const order = { must:0, rec:1, opt:2 };
  recs.sort((x,y) => order[x.tag] - order[y.tag]);
  return recs;
}

// 統一組裝 payload,stage 標記是「自動記錄」還是「手動送出」
function buildPayload(stage) {
  const a = state.ans;
  const recs = state._recs || [];
  const enrolled = recs.filter(r => state.enrollments.has(r.id));
  const toolText = a.tool === "other"
    ? `其他:${state.toolOther||""}`
    : TOOL_LABEL[a.tool];
  return {
    stage,
    name:      state.info.name,
    empId:     state.info.empId,
    role:      ROLE_LABEL[a.role],
    job:       JOB_LABEL[a.job],
    level:     LEVEL_LABEL[a.level],
    freq:      FREQ_LABEL[a.freq],
    tool:      toolText,
    goal:      GOAL_LABEL[a.goal],
    time:      TIME_LABEL[a.time],
    task:      TASK_LABEL[a.task],
    suggestedTopic: state.suggestedTopic || "",
    recommendations: recs.length > 0
      ? recs.map(r => `[${TAG_LABEL[r.tag]}] ${r.code}`)
      : ["(依條件無院內課程推薦,僅顯示免費線上資源)"],
    enrollments:     enrolled.map(r => r.code)
  };
}
// 自動儲存進行中的 promise,submitForm 會 await 它以避免競態(同時送 2 筆資料)
let autoSavePromise = null;
// 自動靜默儲存 — 結果頁一載入就執行,避免使用者直接關閉視窗導致資料流失
async function autoSubmit() {
  if (state.autoSaved) return autoSavePromise;
  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) return;
  state.autoSaved = true;
  autoSavePromise = (async () => {
    try {
      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(buildPayload("自動記錄"))
      });
      const data = await res.json();
      if (data.status !== "ok") {
        state.autoSaved = false; // 失敗時允許下次重試
      }
      // 自動儲存完全靜默 — 不顯示任何提示
    } catch (e) {
      console.warn("auto-save failed", e);
      state.autoSaved = false;
    }
  })();
  return autoSavePromise;
}
async function submitForm() {
  const btn = document.getElementById('submit');
  const payload = buildPayload("手動送出");
  if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
    showToast("尚未設定 Apps Script 網址。請依說明書部署後,把網址貼到 HTML 的 SCRIPT_URL", "error");
    console.log("送出內容(測試用):", payload);
    return;
  }
  btn.disabled = true; btn.textContent = "儲存中…";
  // 等待自動儲存先完成 — 避免兩筆資料並行送達 Apps Script 造成重複列
  if (autoSavePromise) {
    try { await autoSavePromise; } catch (e) { /* 忽略 */ }
  }
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === "ok") {
      state.submitted = true;
      render();
    } else {
      throw new Error(data.error || "未知錯誤");
    }
  } catch (err) {
    console.error(err);
    showToast("儲存失敗:" + err.message, "error");
    btn.disabled = false;
    const recs = state._recs || [];
    btn.textContent = recs.length === 0 ? "送出回覆" : "勾選後前往填寫報名表 →";
  }
}

  `;
  document.getElementById('restart').addEventListener('click', () => {
    state.step = 0; state.ans = {}; state.info = { name:"", empId:"" };
    state.toolOther = ""; state.enrollments = new Set();
    state.suggestedTopic = ""; state.autoSaved = false;
    state.submitted = false; state._recs = null;
    autoSavePromise = null;
    render();
  });
}
// ====== Helpers ======
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function escapeAttr(s) { return escapeHtml(s); }
function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + (type||'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4500);
}
render();
</script>
